<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkX Official</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-overlay">
    <div class="login-box">

        <img src="media/logo.png" class="main-logo">

        <h1>DarkX Official</h1>
        <p class="sub-text">Premium Streaming Experience</p>

        <input type="text" id="username" placeholder="Weka username">

        <button onclick="loginUser()">INGIA</button>

        <small id="usersCount">Users: 0</small>

    </div>
</div>

<!-- HEADER -->
<header class="top-bar">

    <div class="brand">
        <img src="media/logo.png">
        <span>DarkX Official</span>
    </div>

    <div class="header-right">
        <span id="welcomeUser"></span>
        <button onclick="logoutUser()">Logout</button>
    </div>

</header>

<!-- HERO -->
<section class="hero">

    <h2>ULAYANI</h2>
    <p>Watch unlimited premium videos anytime</p>

</section>

<!-- SEARCH -->
<section class="search-box">

    <input
        type="text"
        placeholder="Search video..."
        onkeyup="searchVideos(this.value)"
    >

</section>

<!-- VIDEO GRID -->
<div class="video-grid" id="videoGrid"></div>

<!-- FOOTER -->
<footer class="footer">
    <p>© 2026 DarkX Official</p>
</footer>

<script src="script.js"></script>

</body>
</html>
