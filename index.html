    <style>
        :root {
            --dark-bg: #141414;
            --card-bg: #2f2f2f;
            --netflix-red: #e50914;
            --card-hover: #3a3a3a;
            --text-color: white;
            --download-blue: #007bff;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        header {
            padding: 15px 4%;
            background: rgba(0,0,0,0.8);
            width: 100%;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: var(--netflix-red);
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
        }

        /* Selection Area */
        .selection-container {
            max-width: 1200px;
            margin: 80px auto 0; /* Kuacha nafasi ya header */
            padding: 20px;
        }

        .category-title {
            font-size: 18px;
            color: #e5e5e5;
            margin-bottom: 25px;
            border-left: 4px solid var(--netflix-red);
            padding-left: 10px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* Clip Card */
        .video-card {
            background: var(--card-bg);
            border-radius: 6px;
            transition: all 0.3s ease;
            position: relative;
            border: 2px solid transparent;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .video-card:hover {
            transform: scale(1.03);
            border-color: var(--netflix-red);
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        /* Play Area */
        .play-overlay {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: pointer;
        }

        .play-icon {
            font-size: 50px;
            opacity: 0.8;
            color: var(--netflix-red);
            transition: transform 0.2s ease;
        }

        .video-card:hover .play-icon {
            transform: scale(1.1);
            opacity: 1;
        }

        /* Clip Info */
        .card-info {
            padding: 15px;
            background: rgba(0,0,0,0.9);
            border-top: 1px solid #333;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .clip-title {
            font-size: 14px;
            text-align: center;
            font-weight: 500;
            color: #dcdcdc;
            margin-bottom: 10px;
        }

        /* Buttons Container */
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        /* Action Buttons */
        .action-button {
            padding: 8px;
            border-radius: 4px;
            text-align: center;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            transition: opacity 0.2s;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-button:hover {
            opacity: 0.8;
        }

        .watch-btn {
            background-color: var(--netflix-red);
            color: white;
        }

        .download-btn {
            background-color: var(--download-blue);
            color: white;
        }

        /* Footer */
        footer {
            margin-top: 50px;
            padding: 30px;
            text-align: center;
            color: #666;
            border-top: 1px solid #222;
            font-size: 13px;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .video-grid { grid-template-columns: 1fr; }
            .selection-container { margin-top: 60px; }
            header h1 { font-size: 18px; }
        }
    </style>
</head>
