        .login-card {

            padding: 60px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            text-align: center;
        }

        .login-card h1 {
            color: var(--netflix-red);
            font-size: 32px;
            margin-bottom: 20px;
        }

        .login-card p {

        }

        .login-card input {

            background: var(--input-bg);
            border: none;
            border-radius: 4px;

        .login-card button {

            border: none;

        .age-check {

            font-size: 12px;
            color: #8c8c8c;
        }

        /* --- MAIN CONTENT STYLE --- */
        header {
            padding: 15px 4%;
            background: linear-gradient(to bottom, rgba(0,0,0,1), transparent);
            position: fixed;
            top: 0; width: 100%; z-index: 999;
            display: flex;
            align-items: center;
        }

        header h1 {
            color: var(--netflix-red);
            margin: 0;
            font-size: 28px;
            text-transform: uppercase;
            font-weight: 800;
        }

        .container {
            padding: 100px 4% 40px;
        }

        .section-title {
            font-size: 20px;
            color: #e5e5e5;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 4px;
            overflow: hidden;
            transition: transform 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .video-card:hover {
            transform: scale(1.05);
            z-index: 2;
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            color: var(--netflix-red);
        }

        .card-body {
            padding: 15px;
        }

        .video-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #fff;
        }

        .btn-group {
            display: flex;
            gap: 5px;
        }

        .btn {
            flex: 1;
            padding: 8px;
            font-size: 12px;
            text-align: center;
            text-decoration: none;
            border-radius: 3px;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-watch { background: white; color: black; }
        .btn-download { background: rgba(109, 109, 110, 0.7); color: white; }
        
        .btn:hover { opacity: 0.8; }

        footer {
            padding: 40px;
            text-align: center;
            color: #808080;
            font-size: 13px;
            border-top: 1px solid #333;
        }

        @media (max-width: 600px) {
            .video-grid { grid-template-columns: repeat(2, 1fr); }
            .login-card { padding: 30px; margin: 20px; }
        }
    </style>
</head>
